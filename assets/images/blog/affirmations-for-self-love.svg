<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">50 Affirmations for Self Love with Reflection Prompts</title>
  <desc id="desc">Abstract self-love blog artwork with warm gradient background, heart shapes, and text labels for affirmation and reflection.</desc>

  <defs>
    <linearGradient id="bg" x1="40" y1="20" x2="1160" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF4E8"/>
      <stop offset="0.5" stop-color="#FFEDE0"/>
      <stop offset="1" stop-color="#FDE2D1"/>
    </linearGradient>
    <linearGradient id="blob1" x1="180" y1="80" x2="520" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7B28B"/>
      <stop offset="1" stop-color="#E98D67"/>
    </linearGradient>
    <linearGradient id="blob2" x1="700" y1="170" x2="1060" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2C08E"/>
      <stop offset="1" stop-color="#DEA36D"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1200" height="630" rx="36" fill="url(#bg)"/>

  <circle cx="260" cy="190" r="150" fill="url(#blob1)" opacity="0.3" filter="url(#soft)"/>
  <circle cx="900" cy="390" r="180" fill="url(#blob2)" opacity="0.3" filter="url(#soft)"/>

  <rect x="130" y="130" width="410" height="370" rx="26" fill="#FFFFFF" opacity="0.9"/>
  <rect x="660" y="130" width="410" height="370" rx="26" fill="#FFFFFF" opacity="0.9"/>

  <text x="170" y="195" font-family="'Playfair Display', Georgia, serif" font-size="38" font-weight="700" fill="#5B3324">Affirmation</text>
  <text x="170" y="250" font-family="Lato, Arial, sans-serif" font-size="27" fill="#6D4B3E">I am worthy of</text>
  <text x="170" y="287" font-family="Lato, Arial, sans-serif" font-size="27" fill="#6D4B3E">love exactly</text>
  <text x="170" y="324" font-family="Lato, Arial, sans-serif" font-size="27" fill="#6D4B3E">as I am.</text>

  <path d="M515 195C515 175 531 159 551 159C565 159 578 167 585 179C592 167 605 159 619 159C639 159 655 175 655 195C655 219 635 237 611 259L585 281L559 259C535 237 515 219 515 195Z" fill="#E38462"/>

  <text x="700" y="195" font-family="'Playfair Display', Georgia, serif" font-size="38" font-weight="700" fill="#5B3324">Reflection</text>
  <text x="700" y="250" font-family="Lato, Arial, sans-serif" font-size="27" fill="#6D4B3E">Where do I still act</text>
  <text x="700" y="287" font-family="Lato, Arial, sans-serif" font-size="27" fill="#6D4B3E">as if I need to</text>
  <text x="700" y="324" font-family="Lato, Arial, sans-serif" font-size="27" fill="#6D4B3E">earn love?</text>

  <rect x="170" y="390" width="860" height="64" rx="16" fill="#F7B28B" opacity="0.28"/>
  <text x="205" y="432" font-family="Lato, Arial, sans-serif" font-size="29" font-weight="700" fill="#5B3324">50 Affirmations for Self Love + Prompts</text>
</svg>
