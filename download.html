<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/assets/images/icon.png" />
  <link rel="apple-touch-icon" href="/assets/images/icon.png" />
  <title>Download Becoming</title>
  <meta name="description" content="Download Becoming — the daily affirmation and reflection app — on iOS. Android coming soon." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://becomingdailyapp.com/download" />

  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    .dl-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem var(--container-padding);
      text-align: center;
    }

    .dl-icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 1.75rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    }

    .dl-title {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      font-weight: 500;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }

    .dl-subtitle {
      font-size: 1.0625rem;
      color: var(--text-light);
      line-height: 1.7;
      max-width: 420px;
      margin: 0 auto 2.5rem;
    }

    .dl-buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .dl-divider {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin: 0.5rem 0;
    }

    /* Redirect state */
    .dl-redirecting {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .dl-redirecting.visible {
      display: flex;
    }

    .dl-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .dl-redirect-text {
      font-size: 0.9375rem;
      color: var(--text-light);
    }

    .dl-redirect-fallback {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }

    .dl-redirect-fallback a {
      color: var(--text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* Android coming soon card */
    .dl-coming-soon {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 1.5rem 2rem;
      max-width: 360px;
      text-align: left;
    }

    .dl-coming-soon.visible {
      display: block;
    }

    .dl-coming-soon p {
      font-size: 0.9375rem;
      color: var(--text-light);
      line-height: 1.6;
      margin: 0 0 1rem;
    }

    .dl-coming-soon a {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 100px;
      transition: border-color 0.2s ease;
    }

    .dl-coming-soon a:hover {
      border-color: var(--text-light);
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="assets/images/icon.png" alt="Becoming app logo" class="nav-logo-img" />
        <span class="nav-logo-text">Becoming</span>
      </a>
      <div class="nav-links" id="nav-links">
        <a href="index.html#features" class="nav-link">Features</a>
        <a href="index.html#why-becoming" class="nav-link">Why Becoming</a>
        <a href="daily-affirmation.html" class="nav-link">Daily</a>
        <a href="blog.html" class="nav-link">Blog</a>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <main class="dl-page">

    <img src="assets/images/icon.png" alt="Becoming" class="dl-icon" />

    <!-- Redirecting state (iOS auto-redirect) -->
    <div class="dl-redirecting" id="dl-redirecting">
      <div class="dl-spinner"></div>
      <div>
        <p class="dl-redirect-text">Opening the App Store…</p>
        <p class="dl-redirect-fallback">
          Not opening? <a href="https://apps.apple.com/us/app/becoming-affirm-reflect/id6758968195" target="_blank" rel="noopener noreferrer">Tap here</a>
        </p>
      </div>
    </div>

    <!-- Default state (desktop + manual fallback) -->
    <div id="dl-main">
      <h1 class="dl-title">Get Becoming</h1>
      <p class="dl-subtitle">A daily space to affirm, reflect, and choose who you're becoming.</p>

      <div class="dl-buttons">
        <!-- App Store -->
        <a href="https://apps.apple.com/us/app/becoming-affirm-reflect/id6758968195" target="_blank" rel="noopener noreferrer" class="store-btn store-btn-apple">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          <span>
            <small>Download on the</small>
            App Store
          </span>
        </a>

        <span class="dl-divider">—</span>

        <!-- Google Play -->
        <a href="https://play.google.com/store/apps/details?id=app.rork.motivation_quotes_app_la9y0ug" target="_blank" rel="noopener noreferrer" class="store-btn store-btn-play">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 20.5v-17a.5.5 0 0 1 .76-.43l15 8.5a.5.5 0 0 1 0 .86l-15 8.5A.5.5 0 0 1 3 20.5z"/></svg>
          <span>
            <small>Get it on</small>
            Google Play
          </span>
        </a>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
  <script>
    (function () {
      const ua = navigator.userAgent;
      const isIOS     = /iPhone|iPad|iPod/i.test(ua);
      const isAndroid = /Android/i.test(ua);
      const APP_STORE = 'https://apps.apple.com/us/app/becoming-affirm-reflect/id6758968195';
      const PLAY_STORE = 'https://play.google.com/store/apps/details?id=app.rork.motivation_quotes_app_la9y0ug';

      if (isIOS) {
        // Hide main content, show redirecting spinner
        document.getElementById('dl-main').style.display = 'none';
        document.getElementById('dl-redirecting').classList.add('visible');
        // Redirect after brief delay so the spinner is visible
        setTimeout(() => { window.location.href = APP_STORE; }, 600);
      } else if (isAndroid) {
        // Redirect Android users directly to Google Play
        document.getElementById('dl-main').style.display = 'none';
        document.getElementById('dl-redirecting').classList.add('visible');
        setTimeout(() => { window.location.href = PLAY_STORE; }, 600);
      }
      // Desktop: show both buttons as-is, no changes needed
    })();
  </script>
</body>
</html>
